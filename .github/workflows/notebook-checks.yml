name: Notebook Checks

on:
  push:
    branches:
      - master
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: notebook-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compile-notebooks:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install notebook tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Compile notebooks
        run: python -m pytest -q tests/test_notebooks.py
