name: Notebook Checks

on:
  push:
    branches:
      - master
      - main
  pull_request:

jobs:
  compile-notebooks:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install notebook tooling
        run: |
          python -m pip install --upgrade pip
          pip install nbformat==5.10.4 nbconvert==7.17.1 pytest==9.0.3

      - name: Compile notebooks
        run: pytest -q tests/test_notebooks.py
